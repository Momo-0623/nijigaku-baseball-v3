<!doctype html>
<html lang="ja">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>虹学野球チャレンジ</title>

<style>
:root{
  --navy:#05284d;
  --red:#c52f32;
  --line:#d9dee6;
  --green:#17844d;
  --bg:#f4f6f8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    "Noto Sans JP",
    sans-serif;
  color:#15202b;
}

header{
  background:var(--navy);
  color:#fff;
  padding:18px 20px;
  display:flex;
  align-items:center;
  gap:12px;
}

header img{
  width:42px;
  height:42px;
  object-fit:contain;
}

header b{
  font-size:22px;
}

nav{
  display:none;
  gap:8px;
  padding:12px;
  overflow-x:auto;
  background:#fff;
  border-bottom:1px solid var(--line);
}

nav.show{
  display:flex;
}

nav button,
.btn{
  border:0;
  border-radius:8px;
  padding:11px 16px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  font-size:15px;
}

.tab{
  background:#e8edf3;
  color:#18324b;
}

.tab.active,
.primary{
  background:var(--red);
  color:#fff;
}

.secondary{
  background:var(--navy);
  color:#fff;
}

main{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 8px #0000000a;
  margin-bottom:16px;
}

.card h1,
.card h2,
.card h3{
  margin-top:0;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #cbd3dd;
  border-radius:10px;
  font:inherit;
  margin:8px 0 12px;
  font-size:16px;
}

.full{
  width:100%;
}

.small{
  font-size:13px;
  color:#687481;
}

.ok{
  color:var(--green);
  font-weight:700;
}

.warn{
  color:var(--red);
  font-weight:700;
}

.center{
  text-align:center;
}

.hidden{
  display:none !important;
}


/* =========================
   ルーレット
========================= */

.wheelwrap{
  display:grid;
  place-items:center;
}

.wheel-stage{
  position:relative;
  width:min(430px,82vw);
  aspect-ratio:1;
}

.wheel-disc{
  position:absolute;
  inset:0;
  border-radius:50%;

  background:conic-gradient(
    #3c4147 0deg 72deg,
    #595959 72deg 144deg,
    #3d8d56 144deg 216deg,
    #3165ad 216deg 288deg,
    #e89b2f 288deg 360deg
  );

  border:8px solid #fff;

  box-shadow:
    0 0 0 2px #ccd3dc,
    0 8px 20px #0002;

  transition:
    transform 2.2s cubic-bezier(.1,.7,.1,1);

  z-index:1;
}

.wheel-label{
  position:absolute;
  left:50%;
  top:50%;
  color:#fff;
  font-weight:800;
  font-size:18px;
  line-height:1;
  white-space:nowrap;

  text-shadow:
    0 2px 4px #000a;

  transform-origin:center;
}

.label-1{
  transform:
    translate(-50%,-50%)
    rotate(36deg)
    translateY(-135px)
    rotate(90deg);
}

.label-2{
  transform:
    translate(-50%,-50%)
    rotate(108deg)
    translateY(-135px)
    rotate(90deg);
}

.label-3{
  transform:
    translate(-50%,-50%)
    rotate(180deg)
    translateY(-135px)
    rotate(90deg);
}

.label-4{
  transform:
    translate(-50%,-50%)
    rotate(252deg)
    translateY(-135px)
    rotate(90deg);
}

.label-5{
  transform:
    translate(-50%,-50%)
    rotate(324deg)
    translateY(-135px)
    rotate(90deg);
}

.wheel-ball{
  position:absolute;
  left:50%;
  top:50%;

  transform:
    translate(-50%,-50%);

  width:26%;
  height:26%;

  object-fit:contain;

  background:#fff;
  border-radius:50%;
  padding:4px;

  z-index:3;
}

.pointer{
  font-size:38px;
  color:var(--red);
  margin-bottom:-13px;
  z-index:4;
}

.result{
  text-align:center;
}

.result strong{
  font-size:38px;
  color:var(--red);
}

.score{
  font-size:36px;
  font-weight:800;
  color:var(--red);
  margin-top:8px;
}


/* =========================
   テーブル
========================= */

.table-wrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,
td{
  padding:12px 10px;
  border-bottom:1px solid var(--line);
  text-align:left;
}

th{
  background:#f5f7fa;
}

.rank{
  font-size:19px;
  font-weight:900;
  white-space:nowrap;
}

.rank-1{
  color:#d4af37;
}

.rank-2{
  color:#aeb4bd;
}

.rank-3{
  color:#b87333;
}


/* =========================
   管理者
========================= */

.admin-area{
  margin-top:40px;
  border-top:1px solid var(--line);
  padding-top:20px;
}

.danger{
  background:#8f1f27;
  color:#fff;
}


/* =========================
   スマホ
========================= */

@media(max-width:600px){

  header{
    padding:16px;
  }

  header b{
    font-size:18px;
  }

  main{
    padding:14px;
  }

  .card{
    padding:18px;
  }

  .wheel-stage{
    width:min(360px,80vw);
  }

  .wheel-label{
    font-size:16px;
  }

  .label-1{
    transform:
      translate(-50%,-50%)
      rotate(36deg)
      translateY(-110px)
      rotate(90deg);
  }

  .label-2{
    transform:
      translate(-50%,-50%)
      rotate(108deg)
      translateY(-110px)
      rotate(90deg);
  }

  .label-3{
    transform:
      translate(-50%,-50%)
      rotate(180deg)
      translateY(-110px)
      rotate(90deg);
  }

  .label-4{
    transform:
      translate(-50%,-50%)
      rotate(252deg)
      translateY(-110px)
      rotate(90deg);
  }

  .label-5{
    transform:
      translate(-50%,-50%)
      rotate(324deg)
      translateY(-110px)
      rotate(90deg);
  }

}

</style>
</head>


<body>


<header>

<img
src="baseball.png"
alt=""
>

<b>
虹学野球チャレンジ
</b>

</header>


<nav id="nav">

<button
class="tab active"
data-page="play"
>
打席
</button>

<button
class="tab"
data-page="ranking"
>
ランキング
</button>

<button
class="tab"
data-page="profile"
>
ユーザー
</button>

</nav>


<main>


<!-- =========================
     入場
========================= -->

<section
id="gate"
class="page active"
>

<div class="card">

<h1>参加者限定</h1>

<p class="small">
参加者用パスワードを入力してください。
</p>

<input
id="gatePassword"
type="password"
placeholder="パスワード"
>

<button
id="enterGate"
class="btn secondary full"
>
入場する
</button>

<p
id="gateError"
class="warn"
></p>

</div>

</section>



<!-- =========================
     登録
========================= -->

<section
id="register"
class="page"
>

<div class="card">

<h1>ユーザー登録</h1>

<p class="small">
ランキングに表示する名前を登録してください。
</p>

<input
id="registerName"
type="text"
maxlength="30"
placeholder="名前"
>

<button
id="registerButton"
class="btn primary full"
>
登録する
</button>

<p
id="registerError"
class="warn"
></p>

</div>

</section>



<!-- =========================
     打席
========================= -->

<section
id="play"
class="page"
>

<div class="card center">

<h2 id="welcomeName">
—
</h2>

<p id="playStatus"></p>

</div>


<div class="card wheelwrap">

<div class="pointer">
▼
</div>


<div class="wheel-stage">

<div
id="wheel"
class="wheel-disc"
>

<span class="wheel-label label-1">
アウト
</span>

<span class="wheel-label label-2">
ヒット
</span>

<span class="wheel-label label-3">
二塁打
</span>

<span class="wheel-label label-4">
三塁打
</span>

<span class="wheel-label label-5">
ホームラン
</span>

</div>


<img
class="wheel-ball"
src="baseball.png"
alt=""
>

</div>


<button
id="spin"
class="btn primary"
style="margin-top:20px"
>
ルーレットを回す
</button>

</div>


<div
id="resultCard"
class="card result hidden"
>

<h2>結果</h2>

<strong id="resultName">
—
</strong>

<div
id="resultScore"
class="score"
></div>

<p id="totalScore"></p>

</div>

</section>



<!-- =========================
     ランキング
========================= -->

<section
id="ranking"
class="page"
>

<div class="card">

<h2>個人ランキング</h2>

<div class="table-wrap">

<table>

<thead>

<tr>
<th>順位</th>
<th>名前</th>
<th>得点</th>
</tr>

</thead>

<tbody id="rankingRows"></tbody>

</table>

</div>

</div>

</section>



<!-- =========================
     ユーザー
========================= -->

<section
id="profile"
class="page"
>

<div class="card">

<h2>ユーザー情報</h2>

<p>
現在の名前
</p>

<h3 id="profileName">
—
</h3>

<p>
累計得点：
<b id="profileScore">0pt</b>
</p>

<p>
挑戦回数：
<b id="profilePlays">0回</b>
</p>

<p>
ホームラン：
<b id="profileHomeRuns">0回</b>
</p>

<hr>

<h3>名前を変更</h3>

<input
id="newName"
type="text"
maxlength="30"
placeholder="新しい名前"
>

<button
id="changeName"
class="btn secondary"
>
名前を変更
</button>


<div class="admin-area">

<h3>管理者用</h3>

<p class="small">
管理者のみ使用してください。
</p>

<input
id="adminPassword"
type="password"
placeholder="管理者パスワード"
>

<button
id="resetAll"
class="btn danger"
>
全データをリセット
</button>

</div>

</div>

</section>


</main>


<script>

/* =========================
   API
========================= */

const API_URL=
'https://nijigaku-baseball-free-api.s-h-k-p-h-990.workers.dev';


/* =========================
   保存
========================= */

let token=
localStorage.getItem(
  'nijigaku_free_token'
)||'';

let gateToken='';

let me=null;


/* =========================
   DOM
========================= */

const nav=
document.getElementById('nav');

const gatePassword=
document.getElementById('gatePassword');

const enterGate=
document.getElementById('enterGate');

const gateError=
document.getElementById('gateError');

const registerName=
document.getElementById('registerName');

const registerButton=
document.getElementById('registerButton');

const registerError=
document.getElementById('registerError');

const welcomeName=
document.getElementById('welcomeName');

const playStatus=
document.getElementById('playStatus');

const wheel=
document.getElementById('wheel');

const spin=
document.getElementById('spin');

const resultCard=
document.getElementById('resultCard');

const resultName=
document.getElementById('resultName');

const resultScore=
document.getElementById('resultScore');

const totalScore=
document.getElementById('totalScore');

const rankingRows=
document.getElementById('rankingRows');

const profileName=
document.getElementById('profileName');

const profileScore=
document.getElementById('profileScore');

const profilePlays=
document.getElementById('profilePlays');

const profileHomeRuns=
document.getElementById('profileHomeRuns');

const newName=
document.getElementById('newName');

const changeName=
document.getElementById('changeName');

const adminPassword=
document.getElementById('adminPassword');

const resetAll=
document.getElementById('resetAll');


/* =========================
   API通信
========================= */

async function api(
  path,
  options={}
){

  const headers={
    'Content-Type':'application/json',
    ...(options.headers||{})
  };

  if(token){

    headers.Authorization=
    'Bearer '+token;

  }

  const response=
  await fetch(
    API_URL+path,
    {
      ...options,
      headers,
      cache:'no-store'
    }
  );

  let data={};

  try{

    data=
    await response.json();

  }catch{}

  if(!response.ok){

    throw new Error(
      data.error||
      '通信エラー'
    );

  }

  return data;

}


/* =========================
   ページ
========================= */

function showPage(id){

  document
  .querySelectorAll('.page')
  .forEach(page=>{

    page.classList.remove('active');

  });

  document
  .getElementById(id)
  .classList.add('active');


  document
  .querySelectorAll('.tab')
  .forEach(tab=>{

    tab.classList.toggle(
      'active',
      tab.dataset.page===id
    );

  });

}


document
.querySelectorAll('.tab')
.forEach(button=>{

  button.onclick=async()=>{

    const page=
    button.dataset.page;

    showPage(page);

    if(page==='ranking'){

      await loadRanking();

    }

  };

});


/* =========================
   入場
========================= */

enterGate.onclick=async()=>{

  gateError.textContent='';

  try{

    const response=
    await fetch(
      API_URL+'/auth',
      {
        method:'POST',

        headers:{
          'Content-Type':
          'application/json'
        },

        body:JSON.stringify({

          password:
          gatePassword.value

        })

      }
    );

    const data=
    await response.json();

    if(!response.ok){

      throw new Error(
        data.error||
        '入場できません'
      );

    }

    gateToken=
    data.token;

    showPage('register');

  }catch(error){

    gateError.textContent=
    error.message;

  }

};


/* =========================
   登録
========================= */

registerButton.onclick=async()=>{

  registerError.textContent='';

  const name=
  registerName.value.trim();

  if(!name){

    registerError.textContent=
    '名前を入力してください';

    return;

  }

  try{

    const response=
    await fetch(
      API_URL+'/register',
      {
        method:'POST',

        headers:{
          'Content-Type':
          'application/json',

          'Authorization':
          'Bearer '+gateToken
        },

        body:JSON.stringify({
          name
        })

      }
    );

    const data=
    await response.json();

    if(!response.ok){

      throw new Error(
        data.error||
        '登録できません'
      );

    }

    token=
    data.token;

    localStorage.setItem(
      'nijigaku_free_token',
      token
    );

    me=
    data.user;

    nav.classList.add('show');

    renderMe();

    showPage('play');

  }catch(error){

    registerError.textContent=
    error.message;

  }

};


/* =========================
   自分
========================= */

async function loadMe(){

  if(!token){

    showPage('gate');

    return false;

  }

  try{

    const data=
    await api('/me');

    me=
    data.user;

    nav.classList.add('show');

    renderMe();

    showPage('play');

    return true;

  }catch{

    token='';

    localStorage.removeItem(
      'nijigaku_free_token'
    );

    nav.classList.remove('show');

    showPage('gate');

    return false;

  }

}


function renderMe(){

  if(!me){

    return;

  }

  welcomeName.textContent=
  me.name+' さん';

  profileName.textContent=
  me.name;

  profileScore.textContent=
  (me.score||0)+'pt';

  profilePlays.textContent=
  (me.plays||0)+'回';

  profileHomeRuns.textContent=
  (me.homeRuns||0)+'回';


  if(me.todayResult){

    playStatus.innerHTML=
    '<span class="warn">'+
    '本日は挑戦済みです'+
    '</span><br>'+
    '本日の結果：'+
    me.todayResult+
    ' ＋'+
    me.todayPoints+
    'pt';

    spin.disabled=true;

  }else{

    playStatus.innerHTML=
    '<span class="ok">'+
    '本日はまだ挑戦していません'+
    '</span>';

    spin.disabled=false;

  }

}


/* =========================
   ルーレット
========================= */

const outcomes=[

  {
    name:'アウト',
    center:36
  },

  {
    name:'ヒット',
    center:108
  },

  {
    name:'二塁打',
    center:180
  },

  {
    name:'三塁打',
    center:252
  },

  {
    name:'ホームラン',
    center:324
  }

];


let currentRotation=0;

let spinning=false;


function outcome(name){

  return outcomes.find(
    item=>item.name===name
  );

}


spin.onclick=async()=>{

  if(spinning){

    return;

  }

  spinning=true;

  spin.disabled=true;

  resultCard.classList.add('hidden');


  try{

    /*
    APIが先に結果を決定
    */

    const data=
    await api(
      '/play',
      {
        method:'POST',
        body:'{}'
      }
    );


    const selected=
    outcome(data.result);


    if(!selected){

      throw new Error(
        'ルーレット結果が不明です'
      );

    }


    /*
    マス中央から少しランダム化
    */

    const safeOffset=
    (
      Math.random()*36
    )-18;


    const selectedAngle=
    selected.center+
    safeOffset;


    /*
    針は12時方向
    */

    const targetRotation=
    (
      360-
      selectedAngle
    )%360;


    const normalizedCurrent=
    (
      (
        currentRotation%360
      )+
      360
    )%360;


    const delta=
    (
      targetRotation-
      normalizedCurrent+
      360
    )%360;


    /*
    5回転＋停止位置
    */

    currentRotation+=
    1800+
    delta;


    wheel.style.transform=
    `rotate(${currentRotation}deg)`;


    setTimeout(()=>{

      me=
      data.user;

      resultName.textContent=
      data.result+'！';

      resultScore.textContent=
      '＋'+data.points+' pt';

      totalScore.textContent=
      '個人累計：'+
      me.score+
      'pt';

      resultCard
      .classList
      .remove('hidden');

      renderMe();

      spinning=false;

    },2200);


  }catch(error){

    alert(
      error.message
    );

    spinning=false;

    renderMe();

  }

};


/* =========================
   ランキング
========================= */

function rankClass(index){

  if(index===0){

    return 'rank rank-1';

  }

  if(index===1){

    return 'rank rank-2';

  }

  if(index===2){

    return 'rank rank-3';

  }

  return 'rank';

}


async function loadRanking(){

  rankingRows.innerHTML=
  '<tr><td colspan="3">読み込み中...</td></tr>';

  try{

    const data=
    await api('/ranking');

    rankingRows.innerHTML=
    data.ranking.map(
      (user,index)=>
      `<tr>

      <td>
      <span class="${rankClass(index)}">
      ${index+1}位
      </span>
      </td>

      <td>
      ${escapeHtml(user.name)}
      </td>

      <td>
      ${user.score||0}pt
      </td>

      </tr>`
    ).join('');

  }catch(error){

    rankingRows.innerHTML=
    `<tr>
    <td colspan="3">
    ${escapeHtml(error.message)}
    </td>
    </tr>`;

  }

}


function escapeHtml(value){

  return String(value??'')
  .replaceAll('&','&amp;')
  .replaceAll('<','&lt;')
  .replaceAll('>','&gt;')
  .replaceAll('"','&quot;')
  .replaceAll("'",'&#039;');

}


/* =========================
   名前変更
========================= */

changeName.onclick=async()=>{

  const name=
  newName.value.trim();

  if(!name){

    return alert(
      '新しい名前を入力してください'
    );

  }

  try{

    const data=
    await api(
      '/name',
      {
        method:'POST',

        body:JSON.stringify({
          name
        })
      }
    );

    me=
    data.user;

    newName.value='';

    renderMe();

    alert(
      '名前を変更しました'
    );

  }catch(error){

    alert(
      error.message
    );

  }

};


/* =========================
   管理者リセット
========================= */

resetAll.onclick=async()=>{

  const password=
  adminPassword.value;

  if(!password){

    return alert(
      '管理者パスワードを入力してください'
    );

  }

  if(
    !confirm(
      '全ユーザー・得点・履歴を削除しますか？'
    )
  ){

    return;

  }

  const confirmText=
  prompt(
    '本当に削除する場合は RESET と入力してください'
  );

  if(confirmText!=='RESET'){

    return alert(
      'リセットを中止しました'
    );

  }

  try{

    await api(
      '/admin/reset',
      {
        method:'POST',

        body:JSON.stringify({

          adminPassword:
          password,

          confirm:'RESET'

        })
      }
    );

    localStorage.removeItem(
      'nijigaku_free_token'
    );

    token='';

    me=null;

    nav.classList.remove('show');

    adminPassword.value='';

    alert(
      '全データをリセットしました'
    );

    showPage('gate');

  }catch(error){

    alert(
      error.message
    );

  }

};


/* =========================
   初期化
========================= */

loadMe();

</script>

</body>

</html>
